<!-- product-list.html -->
<div>
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">Quản lý Sản phẩm</h2>
    <a routerLink="/products/create" class="btn btn-info fw-bold px-3">+ THÊM MỚI</a>
  </div>

  <!-- Filter bar -->
  <div class="row g-3 mb-4 align-items-end" style="max-width: 900px;">
    <!-- Keyword Search -->
    <div class="col-md-4">
      <label class="form-label text-secondary small mb-1">Tìm kiếm</label>
      <div class="input-group">
        <span class="input-group-text bg-secondary border-0 text-white">
          <i class="bi bi-search"></i>
        </span>
        <input type="text" class="form-control bg-dark text-white border-0 py-2"
               placeholder="Tên, ID, Danh mục..."
               [(ngModel)]="keyword" (keyup)="onSearch()">
      </div>
    </div>
    
    <!-- Min Price -->
    <div class="col-md-2">
      <label class="form-label text-secondary small mb-1">Giá từ</label>
      <input type="number" class="form-control bg-dark text-white border-0 py-2"
             placeholder="VNĐ" [(ngModel)]="minPrice" (ngModelChange)="onSearch()">
    </div>

    <!-- Max Price -->
    <div class="col-md-2">
      <label class="form-label text-secondary small mb-1">Đến giá</label>
      <input type="number" class="form-control bg-dark text-white border-0 py-2"
             placeholder="VNĐ" [(ngModel)]="maxPrice" (ngModelChange)="onSearch()">
    </div>

    <!-- Sort Dropdown -->
    <div class="col-md-3">
      <label class="form-label text-secondary small mb-1">Sắp xếp theo</label>
      <select class="form-select bg-dark text-white border-0 py-2" 
              [(ngModel)]="sortOrder" (ngModelChange)="onSearch()">
        <option value="">-- Mặc định --</option>
        <option value="price_asc">Giá: Thấp đến Cao</option>
        <option value="price_desc">Giá: Cao đến Thấp</option>
        <option value="name_asc">Tên: A-Z</option>
        <option value="stock_desc">Tồn kho: Nhiều nhất</option>
        <option value="stock_asc">Tồn kho: Ít nhất</option>
      </select>
    </div>
    
    <!-- Search Button (optional, since it auto filters on keyup/change, but good to have) -->
    <div class="col-md-1">
      <button class="btn btn-info w-100 py-2 fw-bold" (click)="onSearch()">
        <i class="bi bi-funnel-fill"></i>
      </button>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-info"></div>
    <p class="mt-2 text-secondary">Đang tải dữ liệu từ server...</p>
  </div>

  <!-- Error -->
  <div *ngIf="error && !isLoading" class="alert alert-danger d-flex align-items-center gap-2">
    <i class="bi bi-exclamation-triangle-fill"></i>
    {{ error }}
  </div>

  <!-- Table -->
  <div *ngIf="!isLoading" class="table-responsive rounded-3 shadow">
    <table class="table table-hover mb-0"
           style="background:#1e293b; color:white; border-color:#334155;">
      <thead style="background:#0f172a; color:#94a3b8;">
        <tr>
          <th class="py-3">ID</th>
          <th class="py-3">Tên Sản Phẩm</th>
          <th class="py-3">Danh Mục</th>
          <th class="py-3">Giá (VNĐ)</th>
          <th class="py-3">Tồn Kho</th>
          <th class="py-3">Thao Tác</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of filteredProducts" style="border-color:#334155;">
          <td class="text-secondary py-3">{{ p.ProductId }}</td>
          <td class="fw-bold text-info py-3">{{ p.ProductName }}</td>
          <td class="py-3">{{ p.CategoryName ?? '—' }}</td>
          <td class="py-3">{{ p.Price | number:'1.0-0' }} đ</td>
          <td class="py-3">
            <span [class]="p.StockQuantity < 10 ? 'badge bg-danger' : 'badge bg-success'">
              {{ p.StockQuantity }}
            </span>
          </td>
          <td class="py-3">
            <a [routerLink]="['/products/edit', p.ProductId]"
               class="btn btn-sm btn-outline-warning me-2">
              <i class="bi bi-pencil-square"></i>
            </a>
            <button class="btn btn-sm btn-outline-danger" (click)="delete(p.ProductId)">
              <i class="bi bi-trash3-fill"></i>
            </button>
          </td>
        </tr>
        <tr *ngIf="filteredProducts.length === 0 && !isLoading">
          <td colspan="6" class="text-center text-secondary py-5">
            <i class="bi bi-inbox fs-2 d-block mb-2"></i>
            Không có sản phẩm nào
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
