<!-- product-list.html -->
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Danh Sach San Pham</h2>
    <a routerLink="/products/create" class="btn btn-primary">+ Them Moi</a>
  </div>
 
  <div class="input-group mb-3" style="max-width: 400px">
    <input type="text" class="form-control" placeholder="Tim kiem..."
      [(ngModel)]="keyword" (keyup.enter)="onSearch()">
    <button class="btn btn-outline-secondary" (click)="onSearch()">Tim</button>
  </div>
 
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2">Dang tai...</p>
  </div>
 
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
 
  <table *ngIf="!isLoading" class="table table-hover table-bordered">
    <thead class="table-dark">
      <tr>
        <th>ID</th><th>Ten San Pham</th><th>Gia (VND)</th>
        <th>Danh Muc</th><th>Ton Kho</th><th>Thao Tac</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of filteredProducts">
        <td>{{ p.ProductId }}</td>
        <td>{{ p.ProductName }}</td>
        <td>{{ p.Price | number:'1.0-0' }} d</td>
        <td>{{ p.CategoryName }}</td>
        <td>{{ p.StockQuantity }}</td>
        <td>
          <a [routerLink]="['/products/edit', p.ProductId]"
             class="btn btn-sm btn-warning me-1">Sua</a>
          <button class="btn btn-sm btn-danger" (click)="delete(p.ProductId)">Xoa</button>
        </td>
      </tr>
      <tr *ngIf="filteredProducts.length === 0">
        <td colspan="6" class="text-center text-muted">Khong co san pham</td>
      </tr>
    </tbody>
  </table>
</div>
