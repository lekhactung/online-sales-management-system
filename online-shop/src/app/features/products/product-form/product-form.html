<div class="container mt-4" style="max-width: 600px">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a routerLink="/products" class="btn btn-outline-secondary btn-sm">← Quay lại</a>
    <h2 class="mb-0">{{ isEdit ? 'Sửa Sản Phẩm' : 'Thêm Sản Phẩm Mới' }}</h2>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="isLoading" class="text-center py-4">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2">Đang tải dữ liệu...</p>
  </div>

  <form *ngIf="!isLoading" [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label fw-bold">Tên Sản Phẩm <span class="text-danger">*</span></label>
      <input type="text" class="form-control" formControlName="ProductName"
             placeholder="VD: iPhone 15 Pro Max">
      <div *ngIf="form.get('ProductName')?.invalid && form.get('ProductName')?.touched"
           class="text-danger small mt-1">
        Tên sản phẩm không được để trống (tối thiểu 2 ký tự)
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Giá Bán (VNĐ) <span class="text-danger">*</span></label>
      <input type="number" class="form-control" formControlName="Price"
             placeholder="VD: 25000000" min="1">
      <div *ngIf="form.get('Price')?.invalid && form.get('Price')?.touched"
           class="text-danger small mt-1">
        Giá bán phải lớn hơn 0
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Danh Mục <span class="text-danger">*</span></label>
      <select class="form-select" formControlName="CategoryId">
        <option value="">-- Chọn danh mục --</option>
        <option *ngFor="let cat of categories" [value]="cat.CategoryId">
          {{ cat.CategoryName }}
        </option>
      </select>
      <div *ngIf="form.get('CategoryId')?.invalid && form.get('CategoryId')?.touched"
           class="text-danger small mt-1">
        Vui lòng chọn danh mục
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-bold">Số Lượng Tồn Kho</label>
      <input type="number" class="form-control" formControlName="StockQuantity"
             placeholder="0" min="0">
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary"
              [disabled]="isSaving">
        <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-1"></span>
        {{ isSaving ? 'Đang lưu...' : (isEdit ? 'Cập nhật' : 'Thêm mới') }}
      </button>
      <a routerLink="/products" class="btn btn-outline-secondary">Hủy</a>
    </div>
  </form>
</div>
