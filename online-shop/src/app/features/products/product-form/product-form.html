<!-- product-form.html -->
<div class="container mt-4" style="max-width: 600px">
  <h2>{{ isEdit ? 'Sua San Pham' : 'Them San Pham Moi' }}</h2>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
 
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label">Ten San Pham</label>
      <input type="text" class="form-control" formControlName="ProductName">
      <div *ngIf="form.get('ProductName')?.invalid && form.get('ProductName')?.touched"
           class="text-danger">Ten san pham khong duoc de trong</div>
    </div>
    <div class="mb-3">
      <label class="form-label">Gia (VND)</label>
      <input type="number" class="form-control" formControlName="Price">
    </div>
    <div class="mb-3">
      <label class="form-label">Danh Muc (ID)</label>
      <input type="number" class="form-control" formControlName="CategoryID">
    </div>
    <div class="mb-3">
      <label class="form-label">Ton Kho</label>
      <input type="number" class="form-control" formControlName="StockQuantity">
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || isLoading">
        {{ isLoading ? 'Dang luu...' : 'Luu' }}
      </button>
      <a routerLink="/products" class="btn btn-secondary">Huy</a>
    </div>
  </form>
</div>
